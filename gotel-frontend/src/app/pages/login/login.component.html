<div class="page active" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--lilac-50,#f8f4ff)">
  <div class="modal" style="position:relative;max-width:440px;width:100%;padding:48px 40px;box-shadow:0 20px 60px rgba(120,80,180,0.15)">

    <div style="text-align:center;margin-bottom:32px">
      <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--lilac-700,#6b3fa0)">
        <span class="logo-dot"></span>GOtel
      </div>
      <p style="color:var(--gray-500,#9ca3af);margin-top:8px;font-size:0.95rem">
        Войдите, чтобы бронировать отели
      </p>
    </div>

    <!-- Error message -->
    @if (errorMessage) {
      <div style="background:#fff0f0;color:#d32f2f;border:1.5px solid #ffcdd2;border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:0.9rem">
        ⚠ {{ errorMessage }}
      </div>
    }

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        placeholder="email@example.com"
        [(ngModel)]="email"
        name="email"
      />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input
        type="password"
        placeholder="Введите пароль"
        [(ngModel)]="password"
        name="password"
      />
    </div>

    <div class="modal-footer" style="margin-top:24px">
      <button
        class="modal-confirm"
        style="width:100%;justify-content:center"
        (click)="onLogin()"
        [disabled]="isLoading"
      >
        @if (isLoading) {
          Входим...
        } @else {
          Войти
        }
      </button>
    </div>

  </div>
</div>
